<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo Envanter Tam Sürüm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        @media (max-width: 768px) { .desktop-table { display: none; } .mobile-cards { display: block; } }
        @media (min-width: 769px) { .desktop-table { display: block; } .mobile-cards { display: none; } }
    </style>
</head>
<body class="p-2 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-lg border-b-4 border-blue-600 mb-6 text-center">
            <div class="inline-block bg-blue-600 p-3 md:p-4 rounded-2xl shadow-md mb-4">
                <span class="text-3xl md:text-4xl">📦</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 mb-2">Depo Envanter Sorgulama</h1>
            <div class="flex flex-col md:flex-row gap-2 max-w-2xl mx-auto mt-4">
                <input type="text" id="searchInput" onkeyup="if(event.keyCode===13) search()" 
                       placeholder="Stok kodu, barkod veya tanım..." 
                       class="flex-1 border-2 border-gray-100 p-4 rounded-2xl focus:border-blue-500 outline-none transition-all shadow-inner text-lg">
                <button onclick="search()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black hover:bg-blue-700 shadow-md">ARA</button>
            </div>
        </div>

        <div class="desktop-table bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white text-xs uppercase tracking-widest">
                    <tr>
                        <th class="p-5">Stok Kodu</th>
                        <th class="p-5">Stok Tanımı</th>
                        <th class="p-5">Barkod</th>
                        <th class="p-5">Lokasyon</th>
                        <th class="p-5 text-blue-300">Bölüm / Alan</th>
                        <th class="p-5 text-center">Adet</th>
                    </tr>
                </thead>
                <tbody id="resultTable" class="divide-y divide-gray-100">
                    <tr><td colspan="6" class="p-20 text-center text-gray-400 italic font-medium">Sorgulama yapın...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="mobileCards" class="mobile-cards space-y-4"></div>
    </div>

    <script>
        let inventory = [];
        fetch('data.json').then(res => res.json()).then(data => { inventory = data; });

        function search() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const table = document.getElementById('resultTable');
            const mobileContainer = document.getElementById('mobileCards');
            if (!query) return;

            const filtered = inventory.filter(item => Object.values(item).some(val => String(val).toLowerCase().includes(query)));
            table.innerHTML = ""; mobileContainer.innerHTML = "";

            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">⚠️ Ürün bulunamadı.</td></tr>';
                mobileContainer.innerHTML = '<div class="bg-white p-10 rounded-3xl text-center text-red-500 font-bold">⚠️ Ürün bulunamadı.</div>';
                return;
            }

            filtered.forEach(item => {
                // Her sütun için birden fazla olasılığı kontrol eden sistem
                const getV = (parts) => {
                    const key = Object.keys(item).find(k => parts.some(p => k.toLowerCase().replace(/\s/g, '').includes(p)));
                    return key ? item[key] : "-";
                };

                const sKodu = getV(["stokkodu", "kodu", "stokno"]);
                const sTanim = getV(["stoktanımı", "tanımı", "stokadı", "tanim"]);
                const barkod = getV(["barkod"]);
                const lokasyon = getV(["lokasyon", "konum", "adres", "raf"]); // Lokasyon için alternatifler eklendi
                const bolum = getV(["bölüm"]);
                const alan = getV(["alan"]);
                const adet = getV(["adet", "sayadet", "miktar", "toplam"]) || "0";

                // Masaüstü Satırı
                table.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-all font-medium text-gray-700">
                        <td class="p-5 font-bold text-blue-700 text-sm">${sKodu}</td>
                        <td class="p-5 text-sm">${sTanim}</td>
                        <td class="p-5 text-xs text-gray-400 font-mono">${barkod}</td>
                        <td class="p-5"><span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-lg text-xs font-black border border-gray-200">${lokasyon}</span></td>
                        <td class="p-5 text-xs text-blue-500 italic font-semibold">${bolum} / ${alan}</td>
                        <td class="p-5 font-black text-center text-lg ${parseInt(adet) > 0 ? 'text-green-600' : 'text-red-500'}">${adet}</td>
                    </tr>`;

                // Mobil Kartı
                mobileContainer.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-md border-l-8 ${parseInt(adet) > 0 ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-blue-700 font-black text-lg leading-tight">${sKodu}</span>
                            <span class="bg-gray-100 text-gray-800 px-3 py-1 rounded-full font-black text-sm">Adet: ${adet}</span>
                        </div>
                        <p class="text-gray-800 font-bold text-sm mb-3">${sTanim}</p>
                        <div class="grid grid-cols-2 gap-2 pt-3 border-t border-gray-50 text-[11px] font-bold text-gray-400 uppercase">
                            <div>Barkod: <span class="block text-gray-600 font-mono mt-1">${barkod}</span></div>
                            <div>Konum: <span class="block text-blue-500 mt-1">${lokasyon} <br> <span class="text-[9px] text-gray-400">(${bolum} / ${alan})</span></span></div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
