<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyner Depo Envanter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        
        <div class="bg-white p-8 rounded-3xl shadow-lg border-b-4 border-red-600 mb-8 text-center">
            <div class="flex flex-col items-center gap-4 mb-6">
                <img src="https://www.boyner.com.tr/assets/images/boyner-logo.png" 
                     alt="Boyner" 
                     class="h-12 w-auto mb-2"
                     onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Boyner_logo.svg/1024px-Boyner_logo.svg.png'">
                <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">Depo Envanter Sistemi</h1>
            </div>
            
            <div class="flex flex-col md:flex-row gap-3 max-w-3xl mx-auto">
                <input type="text" id="searchInput" onkeyup="if(event.keyCode===13) search()" 
                       placeholder="Stok kodu veya barkod ile ara..." 
                       class="flex-1 border-2 border-gray-200 p-4 rounded-2xl focus:border-red-500 outline-none transition-all shadow-inner">
                <button onclick="search()" class="bg-red-600 text-white px-12 py-4 rounded-2xl font-bold hover:bg-red-700 active:scale-95 transition-all shadow-md uppercase">Sorgula</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-900 text-white text-xs uppercase tracking-widest">
                        <tr>
                            <th class="p-5">Stok Kodu</th>
                            <th class="p-5">Stok Tanımı</th>
                            <th class="p-5">Barkod</th>
                            <th class="p-5">Lokasyon</th>
                            <th class="p-5 text-red-400">Bölüm / Alan</th>
                            <th class="p-5">Marka</th>
                            <th class="p-5 text-center">Adet</th>
                        </tr>
                    </thead>
                    <tbody id="resultTable" class="divide-y divide-gray-100 bg-white text-gray-700">
                        <tr><td colspan="7" class="p-20 text-center text-gray-400 italic font-medium">Sorgulama yapmak için yukarıdaki alanı kullanın.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = [];

        // Veriyi çekiyoruz
        fetch('data.json')
            .then(res => res.json())
            .then(data => { inventory = data; })
            .catch(err => { console.error("Veri hatası:", err); });

        function search() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const table = document.getElementById('resultTable');
            if (!query) return;

            // Herhangi bir sütunda eşleşme ara
            const filtered = inventory.filter(item => {
                return Object.values(item).some(val => String(val).toLowerCase().includes(query));
            });

            table.innerHTML = "";
            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="7" class="p-20 text-center text-red-500 font-bold italic text-lg">⚠️ Aranan kriterde ürün bulunamadı.</td></tr>';
                return;
            }

            filtered.forEach(item => {
                // Sütun isimlerindeki boşlukları ve Türkçe karakterleri tolere eden fonksiyon
                const getVal = (keyPart) => {
                    const foundKey = Object.keys(item).find(k => k.toLowerCase().replace(/\s/g, '').includes(keyPart.toLowerCase()));
                    return foundKey ? item[foundKey] : "-";
                };

                const stokKodu = getVal("stokkodu") || getVal("kodu");
                const tanim = getVal("stoktanımı") || getVal("tanım") || getVal("stokadı");
                const barkod = getVal("barkod");
                const lokasyon = getVal("lokasyon");
                const marka = getVal("marka");
                const adet = getVal("adet") || getVal("say.adet") || "0";
                
                // Bölüm ve Alan'ı bulup birleştir
                const bolum = getVal("bölüm") || "";
                const alan = getVal("alan") || "";
                const bolumAlan = (bolum || alan) ? `${bolum} / ${alan}` : "-";

                table.innerHTML += `
                    <tr class="hover:bg-red-50/50 transition-all border-b border-gray-50">
                        <td class="p-5 font-bold text-blue-800">${stokKodu}</td>
                        <td class="p-5 font-semibold text-gray-800">${tanim}</td>
                        <td class="p-5 text-gray-400 text-sm font-mono">${barkod}</td>
                        <td class="p-5"><span class="bg-gray-100 text-gray-800 px-3 py-1.5 rounded-lg text-xs font-black border border-gray-200">${lokasyon}</span></td>
                        <td class="p-5 text-sm font-medium text-red-600 uppercase tracking-tighter italic">${bolumAlan}</td>
                        <td class="p-5 text-sm font-medium text-gray-600">${marka}</td>
                        <td class="p-5 font-black text-center text-lg ${parseInt(adet) > 0 ? 'text-green-600' : 'text-red-500'}">${adet}</td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
