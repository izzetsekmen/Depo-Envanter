<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo Envanter Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-lg border-b-4 border-blue-600 mb-8 text-center">
            
            <div class="flex items-center justify-center gap-4 mb-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Boyner_logo.svg/1024px-Boyner_logo.svg.png" 
                     alt="Boyner Logo" 
                     class="h-10 w-auto">
                <h1 class="text-3xl font-extrabold text-gray-800">Depo Envanter Sistemi</h1>
            </div>
            
            <p class="text-gray-500 mb-6 text-sm">Hızlı sorgulama için stok kodu veya barkod giriniz.</p>
            <div class="flex flex-col md:flex-row gap-3 max-w-3xl mx-auto">
                <input type="text" id="searchInput" onkeyup="if(event.keyCode===13) search()" 
                       placeholder="Aramaya başlayın..." 
                       class="flex-1 border-2 border-gray-200 p-4 rounded-2xl focus:border-blue-500 outline-none transition-all shadow-inner">
                <button onclick="search()" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-bold hover:bg-blue-700 active:scale-95 transition-all shadow-md">ARA</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-800 text-white text-xs uppercase tracking-wider">
                        <tr>
                            <th class="p-5">Stok Kodu</th>
                            <th class="p-5">Stok Tanımı</th>
                            <th class="p-5">Barkod</th>
                            <th class="p-5">Lokasyon</th>
                            <th class="p-5 text-blue-300">Bölüm / Alan</th>
                            <th class="p-5">Marka</th>
                            <th class="p-5 text-center">Adet</th>
                        </tr>
                    </thead>
                    <tbody id="resultTable" class="divide-y divide-gray-100 bg-white">
                        <tr><td colspan="7" class="p-20 text-center text-gray-400 italic">Arama yaparak sonuçları listeleyin...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = [];

        // Veriyi çek
        fetch('data.json')
            .then(res => res.json())
            .then(data => { inventory = data; })
            .catch(err => console.error("Veri yüklenemedi!"));

        function search() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const table = document.getElementById('resultTable');
            if (!query) return;

            const filtered = inventory.filter(item => {
                return Object.values(item).some(val => String(val).toLowerCase().includes(query));
            });

            table.innerHTML = "";
            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="7" class="p-20 text-center text-red-500 font-bold">⚠️ Ürün Bulunamadı!</td></tr>';
                return;
            }

            filtered.forEach(item => {
                const findVal = (keyPart) => {
                    const key = Object.keys(item).find(k => k.toLowerCase().includes(keyPart.toLowerCase()));
                    return key ? item[key] : null;
                };

                // Verileri akıllıca çek
                const stokKodu = findVal("stok kodu") || findVal("kodu") || "-";
                const stokTanimi = findVal("stok tanımı") || findVal("tanımı") || "-";
                const barkod = findVal("barkod") || "-";
                const lokasyon = findVal("lokasyon") || "-";
                const marka = findVal("marka") || "-";
                const adet = findVal("say.adet") || findVal("adet") || "0";
                
                // Bölüm ve Alan Verilerini Bulup Birleştiriyoruz
                const bolum = findVal("bölüm adı") || findVal("bölüm") || "-";
                const alan = findVal("alan adı") || findVal("alan") || "-";
                const bolumAlan = `${bolum} / ${alan}`;

                table.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-all border-b border-gray-50">
                        <td class="p-5 font-bold text-blue-700">${stokKodu}</td>
                        <td class="p-5 font-semibold text-gray-700">${stokTanimi}</td>
                        <td class="p-5 text-gray-400 text-sm font-mono">${barkod}</td>
                        <td class="p-5"><span class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-black border border-gray-200">${lokasyon}</span></td>
                        <td class="p-5 text-sm font-medium text-blue-500 uppercase tracking-tighter">${bolumAlan}</td>
                        <td class="p-5 text-sm font-medium text-gray-600">${marka}</td>
                        <td class="p-5 font-black text-center text-lg ${parseInt(adet) > 0 ? 'text-green-600' : 'text-red-500'}">${adet}</td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
