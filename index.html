<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo Envanter Sorgulama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📦 Depo Envanter</h1>
            <div class="flex flex-col md:flex-row gap-2 mt-6">
                <input type="text" id="searchInput" onkeyup="if(event.keyCode===13) search()" 
                       placeholder="Stok kodu veya barkod yazın..." 
                       class="flex-1 border p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                <button onclick="search()" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">Ara</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr class="text-gray-600 text-sm font-bold uppercase">
                            <th class="p-5">Stok Kodu</th>
                            <th class="p-5">Stok Tanımı</th>
                            <th class="p-5">Barkod</th>
                            <th class="p-5">Lokasyon</th>
                            <th class="p-5">Marka</th>
                            <th class="p-5 text-center">Adet</th>
                        </tr>
                    </thead>
                    <tbody id="resultTable" class="divide-y divide-gray-100">
                        <tr><td colspan="6" class="p-20 text-center text-gray-400 italic">Sonuçları görmek için arama yapın.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let inventory = [];

        fetch('data.json')
            .then(res => res.json())
            .then(data => { inventory = data; })
            .catch(err => alert("Veri yüklenemedi! data.json dosyasını kontrol et."));

        function search() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const table = document.getElementById('resultTable');
            if (!query) return;

            const filtered = inventory.filter(item => {
                return Object.values(item).some(val => String(val).toLowerCase().includes(query));
            });

            table.innerHTML = "";
            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-red-500">❌ Ürün bulunamadı.</td></tr>';
                return;
            }

            filtered.forEach(item => {
                // SÜTUN İSMİNDEN BAĞIMSIZ VERİ ÇEKME MANTIĞI:
                // Excel'deki sıraya göre (0: Bölüm, 1: Alan, 2: Lokasyon, 3: Barkod, 4: Stok Kodu, 5: Stok Tanımı...)
                const vals = Object.values(item);
                
                // Senin paylaştığın sıraya göre eşleştirme:
                const lokasyon = item["Lokasyon"] || vals[2] || "-";
                const barkod = item["Barkod"] || vals[3] || "-";
                const stokKodu = item["Stok Kodu"] || vals[4] || "-";
                const stokTanimi = item["Stok Tanımı"] || vals[5] || "-";
                const marka = item["Marka"] || vals[7] || "-";
                const adet = item["Say.Adet"] || vals[8] || "0";

                table.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-colors">
                        <td class="p-5 font-bold text-blue-700">${stokKodu}</td>
                        <td class="p-5 font-semibold text-gray-800">${stokTanimi}</td>
                        <td class="p-5 text-gray-500 text-sm font-mono">${barkod}</td>
                        <td class="p-5"><span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg text-xs font-bold">${lokasyon}</span></td>
                        <td class="p-5 text-sm text-gray-600">${marka}</td>
                        <td class="p-5 font-black text-center ${parseInt(adet) > 0 ? 'text-green-600' : 'text-red-500'}">${adet}</td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
